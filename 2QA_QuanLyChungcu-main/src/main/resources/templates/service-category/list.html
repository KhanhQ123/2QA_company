<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{_layout}">
<head>
    <meta charset="UTF-8">
    <title>Danh sach nhom dich vu</title>
</head>
<body>
<div layout:fragment="content" class="container body-content">
    <h2 class="mt-3 mb-3">Danh sach nhom dich vu</h2>

    <div class="mb-3 d-flex gap-2">
        <a th:href="@{/service-categories/add}" class="btn btn-primary">Them nhom dich vu</a>
        <a th:href="@{/services}" class="btn btn-secondary">Quan ly dich vu</a>
    </div>

    <div th:if="${successMsg}" class="alert alert-success" th:text="${successMsg}"></div>
    <div th:if="${errorMsg}" class="alert alert-danger" th:text="${errorMsg}"></div>

    <table class="table table-striped">
        <thead>
        <tr>
            <th>Ma nhom</th>
            <th>Ten nhom</th>
            <th>Mo ta</th>
            <th></th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="cat : ${serviceCategories}">
            <td th:text="${cat.id}"></td>
            <td th:text="${cat.name}"></td>
            <td th:text="${cat.description}"></td>
            <td>
                <a th:href="@{/service-categories/edit/{id}(id=${cat.id})}" class="btn btn-secondary btn-sm">Sua</a>
                <a th:href="@{/service-categories/delete/{id}(id=${cat.id})}" class="btn btn-danger btn-sm"
                   onclick="return confirm('Xoa nhom dich vu nay?');">Xoa</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
