<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{_layout}">
<head>
    <meta charset="UTF-8">
    <title>Sua nhom dich vu</title>
</head>
<body>
<div layout:fragment="content" class="container body-content">
    <h2 class="mt-3 mb-3">Sua nhom dich vu</h2>

    <form th:action="@{/service-categories/save}" th:object="${serviceCategory}" method="post" class="form" style="max-width:600px;">
        <input type="hidden" th:field="*{id}">

        <div class="form-group mb-3">
            <label for="name">Ten nhom:</label>
            <input class="form-control" type="text" id="name" th:field="*{name}" required>
        </div>

        <div class="form-group mb-3">
            <label for="description">Mo ta:</label>
            <textarea class="form-control" id="description" th:field="*{description}" rows="3"></textarea>
        </div>

        <a th:href="@{/service-categories}" class="btn btn-secondary">Huy</a>
        <button type="submit" class="btn btn-success">Cap nhat</button>
    </form>
</div>
</body>
</html>
