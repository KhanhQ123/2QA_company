<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{_layout}">
<head>
    <meta charset="UTF-8">
    <title>Sua dich vu</title>
</head>
<body>
<div layout:fragment="content" class="container body-content">
    <h2 class="mt-3 mb-3">Sua dich vu</h2>

    <form th:action="@{/services/save}" th:object="${service}" method="post" class="form" style="max-width:700px;">
        <input type="hidden" th:field="*{id}"/>

        <div class="form-group mb-3">
            <label for="name">Ten dich vu:</label>
            <input class="form-control" type="text" id="name" th:field="*{name}" required>
        </div>

        <div class="form-group mb-3">
            <label for="categoryId">Nhom dich vu:</label>
            <select class="form-select" id="categoryId" name="categoryId" required>
                <option th:each="category : ${categories}"
                        th:value="${category.id}"
                        th:selected="${service.category != null and category.id == service.category.id}"
                        th:text="${category.name}"></option>
            </select>
        </div>

        <div class="form-group mb-3">
            <label for="description">Mo ta:</label>
            <textarea class="form-control" id="description" th:field="*{description}" rows="3"></textarea>
        </div>

        <div class="form-group mb-3">
            <label for="costType">Loai chi phi:</label>
            <input class="form-control" type="text" id="costType" th:field="*{costType}" required>
        </div>

        <div class="form-group mb-3">
            <label for="costValue">Gia tri chi phi:</label>
            <input class="form-control" type="number" step="0.01" min="0" id="costValue" th:field="*{costValue}" required>
        </div>

        <div class="form-group mb-3">
            <label for="unit">Don vi:</label>
            <input class="form-control" type="text" id="unit" th:field="*{unit}" required>
        </div>

        <div class="form-group mb-3">
            <label for="provider">Don vi cung cap:</label>
            <input class="form-control" type="text" id="provider" th:field="*{provider}" required>
        </div>

        <a th:href="@{/services}" class="btn btn-secondary">Huy</a>
        <button type="submit" class="btn btn-success">Cap nhat</button>
    </form>
</div>
</body>
</html>
